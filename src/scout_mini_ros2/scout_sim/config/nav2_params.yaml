# Nav2 configuration for Scout Mini in maze_class7
# ─────────────────────────────────────────────────────────────────────────────
# Customised from the Nav2 default template:
#   - robot_radius         = 0.40 m   (Scout Mini is 0.6 × 0.45 m)
#   - velocity limits      = reduced  (skid-steer slips at high angular speeds)
#   - AMCL initial_pose    = (-8, 8)  (matches the spawn position in Gazebo)
#   - map_server filename  = maps/maze_class7_map.yaml (resolved at launch)
# ─────────────────────────────────────────────────────────────────────────────

amcl:
  ros__parameters:
    use_sim_time: true
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_footprint"
    global_frame_id: "map"
    odom_frame_id: "odom"
    scan_topic: scan
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    # Initial pose is in the SAVED MAP's frame, not Gazebo's world frame.
    # slam_toolbox initialises the map frame at the robot's first scan
    # position, so wherever the robot was when you started slam_toolbox
    # in Exercise 1 corresponds to map (0, 0, 0). Since the robot always
    # spawns at world (-8, 8), and slam_toolbox was started right after
    # spawn, the robot in the saved map frame is at (0, 0, 0).
    set_initial_pose: true
    initial_pose:
      x:   0.0
      y:   0.0
      z:   0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # ── MPPI controller (Model Predictive Path Integral) ──────────────────
    # Sampling-based MPC controller. Generates 2000 candidate trajectories,
    # scores each with the critics below, and computes a weighted average
    # to produce a smooth velocity command. Better than DWB for skid-steer
    # because:
    #   - motion_model: "DiffDrive" natively handles non-holonomic kinematics
    #   - ObstaclesCritic with consider_footprint: true uses our polygon
    #     (not just inflation), giving accurate collision rejection
    #   - Smooth continuous output instead of DWB's discrete velocity bins
    #
    # Velocity limits are reduced vs the real-robot reference config because
    # our sim skid-steer wheels slip during fast rotation.
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56                # how far ahead to predict (56 × 0.05 s = 2.8 s horizon)
      model_dt: 0.05                # MPPI integration step
      batch_size: 2000              # candidate trajectories per planning cycle
      vx_std: 0.2                   # noise std-dev on linear velocity sampling
      vy_std: 0.0                   # DiffDrive has no lateral motion → 0
      wz_std: 0.3                   # noise std-dev on angular velocity
      vx_max: 0.45
      vx_min: -0.30
      vy_max: 0.0                   # DiffDrive: no lateral motion
      wz_max: 0.50                  # kept conservative for skid-steer slip
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.2
      temperature: 0.3              # MPPI weighting temperature (lower → favour cheaper trajectories)
      gamma: 0.015
      motion_model: "DiffDrive"     # critical for non-holonomic robots
      visualize: false              # set true to publish trajectory clouds in RViz (debug only)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        - "ConstraintCritic"
        - "GoalCritic"
        - "GoalAngleCritic"
        - "PathAlignCritic"
        - "PathFollowCritic"
        - "PathAngleCritic"
        - "PreferForwardCritic"
        - "ObstaclesCritic"
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: true     # use the polygon, not just radius — Prof. Kelen's point
        collision_cost: 100000.0
        collision_margin_distance: 0.10
        near_goal_distance: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 6
        threshold_to_consider: 0.5
        offset_from_furthest: 18
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 6
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 20
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.785398
        mode: 0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: true
      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05
      # Polygon footprint matching the URDF (0.60 × 0.45 m, half-extents
      # 0.30 × 0.225). Nav2 rotates this polygon and checks each cell
      # against the costmap, so the actual collision check considers the
      # robot's true rectangular shape — including the diagonal swing
      # during rotations (Prof. Kelen's point).
      footprint: "[[0.30, 0.225], [0.30, -0.225], [-0.30, -0.225], [-0.30, 0.225]]"
      footprint_padding: 0.03
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # SMALL inflation in the local costmap.  The local map is used by
        # the controller for short-horizon trajectory planning — we want
        # to allow tight maneuvers (e.g. squeezing through a doorway,
        # rotating in narrow corridors). The polygon collision check
        # already prevents physical wall contact, so inflation here is
        # just a soft "prefer not to graze walls" hint.
        cost_scaling_factor: 3.0
        inflation_radius: 0.30
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: true
      # Same polygon footprint as the local costmap — the planner checks
      # the rotated polygon against the global map for path validity.
      footprint: "[[0.30, 0.225], [0.30, -0.225], [-0.30, -0.225], [-0.30, 0.225]]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # LARGE inflation in the global costmap.  Used by the planner to
        # bias long-distance paths toward the corridor centerline. With
        # inflation_radius = 1.0 and cost_scaling_factor = 3.0:
        #   - cost at the wall: max
        #   - cost 0.7 m away:  ~14% of max  (still expensive)
        #   - cost 1.0 m away:  ~5% of max   (essentially free)
        # In a 4 m corridor, the planner finds the cheapest path right
        # down the middle. This was the missing piece that let paths
        # hug walls in earlier configurations.
        cost_scaling_factor: 3.0
        inflation_radius: 1.0
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: "maze_class7_map.yaml"

map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.4
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.45, 0.0, 0.50]
    min_velocity: [-0.45, 0.0, -0.50]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    use_realtime_priority: false
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"
      min_height: 0.15
      max_height: 2.0
      enabled: true

# We don't use a charging dock in this exercise, but Nav2's bringup_launch.py
# still loads the docking_server lifecycle node — so we provide a minimal
# valid configuration to keep it happy. None of these settings are exercised.
docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 50.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.7
      staging_yaw_offset: 0.0
      use_external_detection_pose: false
      use_battery_status: false
      use_stall_detection: false
