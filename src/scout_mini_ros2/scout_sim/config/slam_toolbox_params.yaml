slam_toolbox:
  ros__parameters:

    # ── Solver ───────────────────────────────────────────────────────────
    solver_plugin:            solver_plugins::CeresSolver
    ceres_linear_solver:      SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner:     SCHUR_JACOBI
    ceres_trust_strategy:     LEVENBERG_MARQUARDT
    ceres_dogleg_type:        TRADITIONAL_DOGLEG
    ceres_loss_function:      None

    # ── Frames — must match the Scout Mini TF tree ────────────────────────
    # base_frame = base_footprint because the DiffDrive plugin publishes
    # odom→base_footprint directly; using base_link adds an extra TF hop
    # (base_footprint→base_link) that can be missed at scan time.
    odom_frame:  odom
    map_frame:   map
    base_frame:  base_footprint
    scan_topic:  /scan
    mode:        mapping

    # ── General ──────────────────────────────────────────────────────────
    debug_logging:             false
    throttle_scans:            1
    transform_publish_period:  0.02   # seconds
    map_update_interval:       5.0    # seconds
    resolution:                0.05   # metres/cell (matches costmap resolution)
    max_laser_range:           12.0   # metres — Scout Mini GPU lidar range
    minimum_time_interval:     0.2   # accept a scan every 200 ms (was 500 ms)
    transform_timeout:         0.5   # wait up to 500 ms for TF (was 200 ms)
    tf_buffer_duration:        30.0
    stack_size_to_use:         40000000
    enable_interactive_mode:   true

    # ── Scan matching ────────────────────────────────────────────────────
    use_scan_matching:                true
    use_scan_barycenter:              true
    minimum_travel_distance:          0.1   # register a scan every 10 cm
    minimum_travel_heading:           0.1   # ~5.7 deg — catch every small turn
    scan_buffer_size:                 15
    scan_buffer_maximum_scan_distance: 12.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance:       1.5

    # ── Loop closure ─────────────────────────────────────────────────────
    # Disabled: in a repetitive maze (many identical corridors) loop
    # closure creates false matches that rotate/distort the entire map.
    # Re-enable only after the basic map looks correct.
    loop_search_maximum_distance:      3.0
    do_loop_closing:                   false
    loop_match_minimum_chain_size:     10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine:   0.45

    # ── Correlation (scan-to-scan) ────────────────────────────────────────
    correlation_search_space_dimension:   1.0   # wider — handles odometry drift
    correlation_search_space_resolution:  0.01
    correlation_search_space_smear_deviation: 0.1

    # ── Correlation (loop closure) ────────────────────────────────────────
    loop_search_space_dimension:          8.0
    loop_search_space_resolution:         0.05
    loop_search_space_smear_deviation:    0.03

    # ── Scan matcher penalties ────────────────────────────────────────────
    distance_variance_penalty:    0.5
    angle_variance_penalty:       1.0
    fine_search_angle_offset:     0.00349
    coarse_search_angle_offset:   0.349
    coarse_angle_resolution:      0.0349
    minimum_angle_penalty:        0.9
    minimum_distance_penalty:     0.5
    use_response_expansion:       true
